<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0;url=https://www.facebook.com/tppchk">
    <title>頁面跳轉中...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1877f2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #1877f2;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <p>正在帶你前往 Facebook 專頁...</p>
        <p>如果網頁沒有自動跳轉，請<a href="https://www.facebook.com/tppchk">按此處</a>。</p>
    </div>

    <script>
        // 3. 使用 JavaScript 作為雙重保障，確保立即跳轉
        window.location.href = "https://www.facebook.com/tppchk";
    </script>
</body>
</html>
